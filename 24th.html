<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./24th-style.css">

</head>

<body>
    <div class="left-container">
        <div class="iffee">
            <div class="iffee-child-box">

                <img class="rectangle" src="./Group 2.png" alt="">

            </div>
            <button class="iffee-button">iffee</button>

        </div>
        <div class="left-inner-menu">
            <div class="left-inner-menu-title">Menu</div>
            <div class="left-inner-menu-box">
                <img src="./Union.png" alt="">
                <button class="left-inner-menu-button">Home</button>
                <img src="./category.png" alt="">
                <button class="left-inner-menu-button">Garage</button>
                <img src="./Union-2.png" alt="">
                <button class="left-inner-menu-button">Service Menu</button>
                <img src="./group.png" alt="">
                <button class="left-inner-menu-button">Racers</button>
                <img src="./calculator.png" alt="">
                <button class="left-inner-menu-button">Calculator</button>
                <img src="./settings.png" alt="">
                <button class="left-inner-menu-button">Setting</button>
            </div>


        </div>
        <div class="scheduled-races">
            <div class="scheduled-races-title">Scheduled-races</div>
            <div class="scheduld-races-motos">
                <img src="./Ellipse 6.png" alt="">
                <button class="motos-buttons">MotoGP 2022</button>
                <img src="./Ellipse 7.png" alt="">
                <button class="motos-buttons">Dynamics 22</button>
                <img src="./Ellipse 8.png" alt="">
                <button class="motos-buttons">Olimpics</button>
            </div>

        </div>
        <div class="killua">


            <img src="./Ellipse 2-2.png" alt="">
            <input class="killua-input" list="drivers" placeholder="Killua">
            <datalist id="drivers">
                <option value="Killua">
                <option value="Jamshid">
                <option value="Shoxrux">
                <option value="James">

            </datalist>



        </div>


    </div>

    <div class="maincontainer">
        <div class="upper-conatiner">
            <input class="upper-input1" type="search" name="" id="" placeholder="Search for arece, car or racer">



            <input class="upper-input2" list="drivers" placeholder="Choose a car">

            <datalist id="drivers">
                <option value="HONDA">
                <option value="NISSAN">
                <option value="KIA">
                <option value="James">

            </datalist>


            <img src="./notification.png" alt="">
            <img src="./person.png" alt="">
            <img src="./Ellipse 3.png" alt="">


        </div>
        <div class="button-container">
            <div class="button-container-zero">
                <img src="./Group@2x.png" alt="" width="40px" height="40px">
                <button class="but-con-buttons"> Start </button>

            </div>
            <div class="button-container-first">
                <img src="./Vector.png" alt="">
                <button class="but-con-buttons">Drive </button>

            </div>

            <div class="button-container-second">
                <img src="./Vector-2.png" alt="">
                <button class="but-con-buttons"> Maintinance</button>

            </div>
            <div class="button-container-third">
                <img src="./Group-21.png" alt="">
                <button class="but-con-buttons"> Battery</button>

            </div>
            <div class="button-container-fourth">
                <img src="./Group-3.png" alt="">
                <button class="but-con-buttons"> Tires</button>

            </div>
            <div class="button-container-fifth">
                <img src="./Group-4.png" alt="">
                <button class="but-con-buttons">Lock </button>

            </div>


        </div>
        <div class="mid-container">
            <div class="mid-con-right">
                <div class="mid-con-right-title">
                    <h1>Infiniti Renault™ </h1>
                    <div class="mid-con-right-main-buttons">
                        <div class="btn1">

                            <img class="mid-con-right-buttons" src="./Vector 636.png" alt="">
                        </div>
                        <div class="btn2">
                            <img class="mid-con-right-buttons" src="./Vector 637.png" alt="">

                        </div>



                    </div>


                </div>
                <div>

                    <img src="./Car.png" alt="">
                </div>


            </div>
            <div class="mid-con-left">
                <div class="mid-con-left1">
                    <div class="mid-con-left1-icon">
                        <img class="mid-con-left1-innericon"  src="./cat icon.png" alt="">



                    </div>
                    <div class="mid-con-left-text">
                        <h4>72 </h4>
                        <button class="mid-con-left-text">Championships</button>



                    </div>



                </div>
                <div class="mid-con-left2">
                    <div class="mid-con-left2-icon">
                        <img class="mid-con-left2-innericon" src="./moon icon.png" alt="">



                    </div>
                    <div class="mid-con-left-text">
                        <h4> 32</h4>
                        <button class="mid-con-left-text">Skins</button>



                    </div>



                </div>
                <div class="mid-con-left3">
                    <div class="mid-con-left3-icon">
                        <img class="mid-con-left3-innericon" src="./Vector-3.png" alt="">



                    </div>
                    <div class="mid-con-left-text">
                        <h4> 64</h4>
                        <button class="mid-con-left-text">Trophies Won</button>



                    </div>



                </div>



            </div>
        </div>
        <div class="below-container">
            <img class="below-con-img" src="./Graph 1.png" alt="">
            <img class="below-con-img" src="./Graph 2.png" alt="">

        </div>

    </div>
</body>

</html>
